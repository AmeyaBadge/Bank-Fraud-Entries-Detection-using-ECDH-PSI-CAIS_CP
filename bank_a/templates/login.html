<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank A — Secure Login</title>
  <meta name="description" content="Bank A PSI Platform secure analyst login portal." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root { --navy:#0A1628;--blue:#1A3A6B;--accent:#2563EB;--red:#DC2626; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body {
      font-family:'Inter',sans-serif;
      min-height:100vh;
      background: radial-gradient(ellipse at 30% 20%, #1A3A6B 0%, #0A1628 60%);
      display:flex;align-items:center;justify-content:center;
    }
    .login-wrap {
      width:100%;max-width:420px;padding:1.5rem;
    }
    .brand {
      text-align:center;margin-bottom:2rem;
    }
    .brand-icon {
      width:64px;height:64px;
      background:linear-gradient(135deg,#2563EB,#7C3AED);
      border-radius:16px;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:1.8rem;margin-bottom:1rem;
      box-shadow:0 8px 32px rgba(37,99,235,0.4);
    }
    .brand h1 { font-size:1.5rem;font-weight:700;color:#E2E8F0; }
    .brand p  { color:#64748B;font-size:0.85rem;margin-top:0.25rem; }
    .card {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:2rem;
      backdrop-filter:blur(12px);
    }
    label { display:block;font-size:0.8rem;font-weight:500;color:#94A3B8;margin-bottom:0.4rem; }
    .input-wrap { position:relative;margin-bottom:1.25rem; }
    .input-wrap i { position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#475569;font-size:0.9rem; }
    input[type=text],input[type=password] {
      width:100%;padding:0.8rem 1rem 0.8rem 2.8rem;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;
      color:#E2E8F0;font-family:'Inter',sans-serif;font-size:0.9rem;
      outline:none;transition:border-color 0.2s,box-shadow 0.2s;
    }
    input:focus { border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,0.2); }
    .btn-login {
      width:100%;padding:0.9rem;
      background:linear-gradient(135deg,#2563EB,#1D4ED8);
      color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;
      border:none;border-radius:10px;cursor:pointer;
      transition:transform 0.15s,box-shadow 0.15s;
      margin-top:0.5rem;
    }
    .btn-login:hover { transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,0.4); }
    .error-msg {
      background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);
      border-radius:8px;padding:0.7rem 1rem;color:#FCA5A5;font-size:0.82rem;
      margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;
    }
    .hint { text-align:center;margin-top:1rem;font-size:0.75rem;color:#475569; }
    .hint span { color:#2563EB; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-landmark" style="color:#fff"></i></div>
      <h1>Bank A Portal</h1>
      <p>PSI Platform v2.0 — Fraud Detection Node</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
      {% endif %}
      <form method="POST" action="/ui/login">
        <div class="input-wrap">
          <label for="username">Username</label>
          <i class="fa-solid fa-user"></i>
          <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username" />
        </div>
        <div class="input-wrap">
          <label for="password">Password</label>
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i>&nbsp; Sign In Securely</button>
      </form>
      <div class="hint">Default: <span>admin</span> / <span>admin123</span></div>
    </div>
  </div>
</body>
</html>
